services:
  backend:
    build: ./backend
    container_name: cloudgoat-lite-backend
    ports:
      # Explicitly bound to 0.0.0.0 so other devices on the LAN can reach the
      # API directly, not just the machine running Docker. See README.md.
      - "0.0.0.0:8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cloudgoat-lite-frontend
    ports:
      - "0.0.0.0:8080:8080"
    depends_on:
      - backend
    restart: unless-stopped
